<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Rock, Paper, Scissors</title>
    </head>

    <body>

        <script>
            function getComputerChoice() {
                let randomNumber = Math.floor(Math.random() * 3 + 1);
                switch (randomNumber) {
                    case 1:
                        return 'rock';
                        break;

                    case 2:
                        return 'paper';
                        break;

                    case 3:
                        return 'scissors';
                        break;
                }
            }
        </script>
    </body>
</html>
